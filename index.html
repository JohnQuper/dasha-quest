<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Наша история</title>
  <style>
    :root { --bg:#fdf8f9; --text:#4a4042; --accent:#d98fa3; --card:#fff; --input-bg:#f7f0f2; --btn:#c77b8e; --btn-text:#fff; --success:#7cb589; --hint:#9a8a8e; --shadow:0 4px 20px rgba(217,143,163,0.15); }
    * { box-sizing:border-box; margin:0; padding:0; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif; }
    body { background:var(--bg); color:var(--text); min-height:100vh; display:flex; flex-direction:column; align-items:center; padding:env(safe-area-inset-top) 16px env(safe-area-inset-bottom); background-image:radial-gradient(#f2d9e1 1px,transparent 1px); background-size:14px 14px; }
    header { width:100%; text-align:center; padding:20px 0 10px; font-size:24px; font-weight:600; }
    .progress { display:flex; gap:8px; margin:15px 0 25px; flex-wrap:wrap; justify-content:center; opacity: 0; transition: opacity 0.5s; pointer-events: none; }
    .progress.visible { opacity: 1; pointer-events: auto; }
    .progress-slot { background:#f0e6e9; color:#b09aa0; padding:8px 14px; border-radius:20px; font-size:13px; transition:all 0.3s; font-weight: 600; }
    .progress-slot.active { background:var(--btn); color:#fff; transform:scale(1.05); }
    main { width:100%; max-width:420px; min-height:60vh; }
    .stage { background:var(--card); padding:20px; border-radius:20px; box-shadow:var(--shadow); display:none; flex-direction:column; gap:16px; animation:fadeIn 0.4s ease; }
    .stage.active { display:flex; }
    @keyframes fadeIn { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
    h2 { font-size:18px; text-align:center; color:#3a3032; }
    .subtitle { font-size:13px; color:var(--hint); text-align:center; }
    .intro-text { font-size:15px; line-height:1.6; color:#5a4f51; text-align: center; margin-bottom: 10px; }
    p,.task-text { font-size:15px; line-height:1.5; color:#5a4f51; }
    .input-group { margin:10px 0; }
    label { display:block; font-size:13px; color:var(--hint); margin-bottom:6px; }
    input { width:100%; padding:12px; border:1px solid #e8dce0; border-radius:12px; background:var(--input-bg); font-size:15px; outline:none; transition: all 0.3s; }
    input:focus { border-color:var(--accent); }
    input.solved { border-color: var(--success); background: #f0fff4; }
    .btn { background:var(--btn); color:var(--btn-text); border:none; padding:14px; border-radius:14px; font-size:15px; font-weight:500; cursor:pointer; margin-top:10px; display:block; width:100%; }
    .btn:active { transform:scale(0.98); opacity:0.9; }
    #nextBtn { display: none; }
    #nextBtn.show { display: block; animation: fadeIn 0.5s ease; }
    .btn-hint { background:transparent; color:var(--hint); border:1px dashed #e0d3d6; margin-top:8px; font-size:13px; display:block; width:100%; }
    .hint-text { display:none; background:#fcf5f7; border-left:3px solid var(--accent); padding:10px; font-size:13px; color:#7a6b6f; border-radius:0 8px 8px 0; margin-top:8px; }
    .final-screen { text-align:center; gap:20px; padding:30px 20px; }
    .final-photo { width:100%; max-width:280px; aspect-ratio:3/4; object-fit:cover; border-radius:16px; box-shadow:var(--shadow); margin:0 auto; }
    .final-phrase { font-size:22px; font-weight:700; margin:15px 0; color:var(--accent); }
    .final-text { font-size:14px; line-height:1.6; text-align:left; background:#fdf5f7; padding:15px; border-radius:12px; }
    .timer-box { background:#f7eef1; color:var(--accent); padding:12px; border-radius:12px; font-family:monospace; font-size:18px; margin-top:10px; border:1px solid #e8dce0; }
    #reset-btn { position:fixed; bottom:10px; right:10px; font-size:10px; opacity:0.3; background:none; border:none; color:#b09aa0; }
    
    .cw-grid { display:grid; grid-template-columns:repeat(9,1fr); gap:3px; max-width:340px; width:100%; margin:0 auto; }
    .cw-cell { aspect-ratio:1; display:flex; align-items:center; justify-content:center; font-size:16px; font-weight:600; border:1px solid #e8dce0; border-radius:4px; background:#fff; position:relative; min-height:36px; }
    .cw-cell.hl { background:#fce4ec; border-color:#d98fa3; box-shadow:0 0 0 2px rgba(217,143,163,0.3); }
    .cw-cell.hl::after { content:''; position:absolute; top:2px; right:2px; width:5px; height:5px; background:var(--accent); border-radius:50%; }
    .cw-cell.emp { border:none; background:transparent; }
    .cw-cell.hidden { background:#f7f0f2; color:transparent; }
    .cw-cell.revealed { background:#e8f5e9; border-color:#7cb589; color:#4a4042; animation:reveal 0.4s ease; }
    @keyframes reveal { from{transform:scale(0.8);opacity:0} to{transform:scale(1);opacity:1} }
    .cw-questions { width:100%; display:flex; flex-direction:column; gap:12px; }
    .cw-q { display:flex; align-items:center; gap:8px; }
    .cw-num { min-width:22px; height:22px; background:var(--accent); color:#fff; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:600; }
    .cw-txt { font-size:13px; flex:1; color:#5a4f51; }
    .cw-inp { width:80px; font-size:14px; padding:8px; text-align:center; transition: all 0.3s; }
    .word-reveal { display:flex; gap:8px; justify-content:center; margin:10px 0; opacity:0; transition:opacity 0.5s; }
    .word-reveal.vis { opacity:1; }
    .ltr { width:36px; height:36px; display:flex; align-items:center; justify-content:center; font-size:20px; font-weight:700; background:var(--accent); color:#fff; border-radius:8px; animation:popIn 0.4s ease backwards; }
    .ltr:nth-child(2){animation-delay:0.1s} .ltr:nth-child(3){animation-delay:0.2s} .ltr:nth-child(4){animation-delay:0.3s}
    @keyframes popIn { from{transform:scale(0)} to{transform:scale(1)} }
  </style>
</head>
<body>
  <header>Наша история ❤️</header>
  <div class="progress" id="progressBar"></div>
  <main id="gameContainer"></main>
  <button id="reset-btn" onclick="resetGame()">↺ Сброс</button>

  <script>
    const CONFIG = {
      stage1: {
        title: "Этап 1: Сканворд",
        description: "Вводи ответы по одному. Когда слово верное, клетки откроются сами.",
        words: [
          {q:"Место, где начинается наш каждый день", a:"дом", row:0, col:5, len:3},
          {q:"Из неё мы пьём утренний кофе", a:"чашка", row:1, col:4, len:5},
          {q:"То, что поёт, когда ты рядом", a:"душа", row:2, col:3, len:4},
          {q:"Она сияет на ночном небе", a:"звезда", row:3, col:0, len:6}
        ],
        highlights: [{r:0, c:5}, {r:1, c:5}, {r:2, c:5}, {r:3, c:5}],
        collectedWord: "ДАША",
        hint: "Подумай о простых вещах, которые делают нас счастливее."
      },
      stage2: { title:"Этап 2: Загадка", text:"Я не число, но прибавляю к тебе меня. В математике соединяю цифры, а в жизни — сердца. Что я?", answer:"плюс", hint:"Это знак, который означает \"вместе мы больше\"." },
      stage3: { title:"Этап 3: QR-поиск", text:"Найди QR-код, спрятанный за нашей общей фотографией на кухне. Что на нём написано?", answer:"даня", hint:"Посмотри за рамкой на кухне." },
      stage4: { title:"Этап 4: Книжный тайник", step1Q:"Книга, которую я тебе посоветовал, и ты недавно её закончила. Введи её название:", step1A:"финансист", revealText:"📖 Открой на стр. 7, строка 2, слово 4. Введи это слово:", step2A:"равно", page:7, line:2, word:4, hint:"Вспомни роман о бирже и сильных людях." },
      stage5: { title:"Этап 5: Наша дата", text:"Дата, которая стала отправной точкой наших отношений (ДД.ММ.ГГГГ):", answer:"31.01.2026", hint:"Вспомни тот вечер, когда мы наконец стали парой." },
      final: { 
        phrase:"ДАША ПЛЮС ДАНЯ РАВНО СЕМЬЯ", 
        message:`Душа моя! Спасибо, что прошла мою маленькую игру. Сегодня ровно 3 месяца, как начался лучший период в моей жизни. И это все, благодаря тебе. Я очень сильно тебя люблю.\n\nПриглашаю тебя на свидание 1 мая в 13:00. Поедем кататься на лошадках! Так что надень то, что не жалко.\n\nНавсегда твой - Даня`, 
        address:" СПб, деревня Райкузи, улица Брусничная, д. 0", 
        targetDate:"2026-05-01T13:00:00" 
      }
    };

    const state = { currentStage:0, collected:[], solvedWords:[] };
    const container = document.getElementById('gameContainer');
    const progressBar = document.getElementById('progressBar');

    function norm(s){return s.toLowerCase().replace(/[^а-яё0-9]/g,'').replace(/ё/g,'е')}
    function saveState(){localStorage.setItem('quest_state',JSON.stringify(state))}
    function loadState(){const s=localStorage.getItem('quest_state');if(s){Object.assign(state,JSON.parse(s));return true}return false}

    function renderProgress(){
      if(state.currentStage < 1) {
        progressBar.classList.remove('visible');
        return;
      }
      progressBar.classList.add('visible');
      progressBar.innerHTML='';
      const targetWords = ["ДАША", "ПЛЮС", "ДАНЯ", "РАВНО", "СЕМЬЯ"];
      
      for(let i=0; i<5; i++) {
        const d=document.createElement('div');
        if(i < state.collected.length) {
          d.className = 'progress-slot active';
          d.textContent = state.collected[i];
        } else {
          d.className = 'progress-slot';
          d.textContent = '...';
        }
        progressBar.appendChild(d);
      }
    }

    function nextStage(){
      document.querySelector('.stage.active')?.classList.remove('active');
      state.currentStage++;saveState();renderStage();renderProgress();
    }

    function startGame(){
        document.querySelector('.stage.active')?.classList.remove('active');
        state.currentStage = 1;
        saveState();
        renderStage();
        renderProgress();
    }

    function toggleHint(){const h=document.querySelector('.hint-text');h.style.display=h.style.display==='block'?'none':'block'}

    function renderStage(){
      container.innerHTML='';
      if(state.currentStage > 5){renderFinal();return}
      
      if(state.currentStage === 0){
        const startScreen = document.createElement('div');
        startScreen.className = 'stage active';
        startScreen.innerHTML = `
            <h2>Привет, Даша ❤️</h2>
            <p class="intro-text">Душа моя. Я сделал эту небольшую игру, для того, чтобы ты немного передохнула от дел и, надеюсь, интересно и весело провела время.</p>
            <p class="intro-text">В игре будет пять заданий, которые тебе нужно будет выполнить, чтобы узнать, какой сюрприз я тебе приготовил.</p>
            <p class="intro-text">Если что-то будет непонятно, то я всегда рядом и дам любые подсказки.</p>
            <p class="intro-text" style="font-weight:600; margin-top:15px;">Начинаем?</p>
            <button class="btn" onclick="startGame()">В путь ❤️</button>
        `;
        container.appendChild(startScreen);
        return;
      }

      const cfg=CONFIG[`stage${state.currentStage}`];
      const stage=document.createElement('div');
      stage.className='stage active';
      stage.innerHTML=`<h2>${cfg.title}</h2>`;

      if(state.currentStage===1){
        stage.innerHTML+=`
          <p class="subtitle">${cfg.description}</p>
          <div class="cw-grid" id="cwGrid"></div>
          <div class="word-reveal" id="wordReveal"><div class="ltr">Д</div><div class="ltr">А</div><div class="ltr">Ш</div><div class="ltr">А</div></div>
          <div class="cw-questions" id="cwQuestions"></div>
          <button class="btn" id="nextBtn" onclick="nextStage()">Далее →</button>
          <button class="btn btn-hint" onclick="toggleHint()">💡 Показать подсказку</button>
          <div class="hint-text">${cfg.hint}</div>`;
        setTimeout(()=>buildCrossword(cfg), 50);
      }
      else if([2,3,5].includes(state.currentStage)){
        stage.innerHTML+=`<p class="task-text">${cfg.text}</p><div class="input-group"><input type="text" id="answer" placeholder="Твой ответ..."></div><button class="btn" onclick="checkSimple()">Далее →</button><button class="btn btn-hint" onclick="toggleHint()">💡 Показать подсказку</button><div class="hint-text">${cfg.hint}</div>`;
      }
      else if(state.currentStage===4){
        stage.innerHTML+=`
          <div id="step1"><p class="task-text">${cfg.step1Q}</p><div class="input-group"><input type="text" id="book" placeholder="Название книги"></div><button class="btn" onclick="checkBook()">Узнать координаты</button></div>
          <div id="step2" style="display:none"><p class="task-text">${cfg.revealText}</p><div class="input-group"><input type="text" id="word" placeholder="Найденное слово"></div><button class="btn" onclick="checkWord()">Далее →</button></div>
          <button class="btn btn-hint" onclick="toggleHint()">💡 Показать подсказку</button><div class="hint-text">${cfg.hint}</div>`;
      }
      container.appendChild(stage);
    }

    function buildCrossword(cfg) {
      const gridEl = document.getElementById('cwGrid');
      const qEl = document.getElementById('cwQuestions');
      
      const gridData = [
        ['', '', '', '', '', 'Д', 'О', 'М', ''],
        ['', '', '', '', 'Ч', 'А', 'Ш', 'К', 'А'],
        ['', '', '', 'Д', 'У', 'Ш', 'А', '', ''],
        ['З', 'В', 'Е', 'З', 'Д', 'А', '', '', '']
      ];
      
      for(let r=0; r<4; r++){
        for(let c=0; c<9; c++){
          const letter = gridData[r][c] || '';
          const isHL = cfg.highlights.some(h => h.r===r && h.c===c);
          
          const cell = document.createElement('div');
          cell.className = `cw-cell ${!letter ? 'emp' : 'hidden'} ${isHL ? 'hl' : ''}`;
          cell.dataset.r = r;
          cell.dataset.c = c;
          if (letter) {
            cell.dataset.char = letter;
          }
          cell.textContent = letter ? '?' : '';
          gridEl.appendChild(cell);
        }
      }

      cfg.words.forEach((w, idx) => {
        const div = document.createElement('div');
        div.className = 'cw-q';
        div.innerHTML = `
          <div class="cw-num">${idx+1}</div>
          <div class="cw-txt">${w.q}</div>
          <input class="cw-inp" id="w${idx+1}" maxlength="${w.len}" placeholder="...">
        `;
        qEl.appendChild(div);

        const input = div.querySelector('input');
        input.addEventListener('input', (e) => {
          const val = e.target.value;
          if (norm(val) === norm(w.a)) {
            e.target.classList.add('solved');
            e.target.disabled = true;
            revealWordInGrid(w.row, w.col, w.len);
            state.solvedWords.push(idx);
            
            if(state.solvedWords.length === 4) {
              state.collected.push("ДАША");
              saveState();
              document.getElementById('wordReveal').classList.add('vis');
              document.getElementById('nextBtn').classList.add('show');
            }
          }
        });
      });
    }

    function revealWordInGrid(startRow, startCol, len) {
      const cells = document.querySelectorAll('.cw-cell');
      cells.forEach(cell => {
        const r = parseInt(cell.dataset.r);
        const c = parseInt(cell.dataset.c);
        
        if(r === startRow && c >= startCol && c < startCol + len) {
          const char = cell.dataset.char;
          if (char && char.trim() !== '') {
            cell.textContent = char;
            cell.classList.remove('hidden');
            cell.classList.add('revealed');
          }
        }
      });
    }

    function checkSimple(){
      const v=document.getElementById('answer').value.trim();
      const cfg=CONFIG[`stage${state.currentStage}`];
      if(norm(v)===norm(cfg.answer)){
        let wordToAdd = cfg.answer.toUpperCase();
        if(state.currentStage === 5) wordToAdd = "СЕМЬЯ";
        
        state.collected.push(wordToAdd);
        saveState();nextStage()
      }
      else{alert('❌ Не совсем так. Попробуй ещё раз.')}
    }

    function checkBook(){
      const v=document.getElementById('book').value.trim();
      if(norm(v).includes(norm(CONFIG.stage4.step1A))){
        document.getElementById('step1').style.display='none';
        document.getElementById('step2').style.display='block';
        alert(`📖 Страница: ${CONFIG.stage4.page}\n📏 Строка: ${CONFIG.stage4.line}\n🔍 Слово №: ${CONFIG.stage4.word}`);
      }else{alert('❌ Не та книга. Вспомни, что я советовал.')}
    }

    function checkWord(){
      const v=document.getElementById('word').value.trim();
      if(norm(v)===norm(CONFIG.stage4.step2A)){
        state.collected.push("РАВНО");
        saveState();nextStage()
      }
      else{alert('❌ Слово не совпадает. Пересчитай ещё раз.')}
    }

    function renderFinal(){
      container.innerHTML='';
      const f=document.createElement('div');f.className='stage active final-screen';
      f.innerHTML=`
        <h2>🎉 Поздравляю!</h2>
        <div class="final-phrase">"${CONFIG.final.phrase}"</div>
        <img src="photo.jpg" alt="Мы" class="final-photo" onerror="this.style.display='none'">
        <div class="final-text">${CONFIG.final.message.replace(/\n/g,'<br>')}</div>
        <div class="final-text" style="font-weight:600">${CONFIG.final.address}</div>
        <div class="timer-box" id="timer"> Загрузка...</div>`;
      container.appendChild(f);startTimer();
    }

    function startTimer(){
      const t=new Date(CONFIG.final.targetDate).getTime();
      const el=document.getElementById('timer');
      const up=()=>{
        const d=t-Date.now();
        if(d<=0){el.textContent='🕊️ Время пришло!';return}
        const dd=Math.floor(d/86400000),h=Math.floor(d%86400000/3600000),m=Math.floor(d%3600000/60000),s=Math.floor(d%60000/1000);
        el.textContent=`⏳ До свидания: ${dd}д ${h}ч ${m}м ${s}с`;
      };up();setInterval(up,1000);
    }

    function resetGame(){
        if(confirm('Сбросить прогресс?')){
            localStorage.removeItem('quest_state');
            location.reload();
        }
    }

    loadState();
    if(state.currentStage === 0 && state.collected.length > 0) {
        state.currentStage = 1; 
    }
    renderProgress();
    renderStage();
  </script>
</body>
</html>
